<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

<title>Starveil Network | Premium Minecraft Server</title>

<link rel="icon" type="image/png" href="logo.png">
<link rel="shortcut icon" href="logo.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ===================================== */
/* COMPLETE CSS - NO EXTERNAL DEPENDENCIES */
/* ===================================== */

/* ROOT COLORS - Clean Purple/Blue Gradient */
:root {
    --bg-start: #ffffff;
    --bg-mid: #f5f0f8;
    --bg-end: #e8e0f0;
    --text: #2d1a24;
    --text-soft: #6a5a6a;
    --text-light: #9a8a9a;
    --card: rgba(255,255,255,.95);
    --card-border: rgba(167,130,198,0.25);
    --navbar-bg: rgba(255,255,255,.92);
    --gradient-purple: linear-gradient(135deg, #bea5d5, #9d7fbf, #776fa3);
    --gradient-purple-light: linear-gradient(135deg, #dacfe8, #bea5d5, #9d7fbf);
    --shadow: rgba(128,100,150,0.1);
    --shadow-hover: rgba(128,100,150,0.18);
    --btn-hover: rgba(167,130,198,0.1);
    --accent-glow: #bea5d5;
    --dropdown-bg: rgba(255,255,255,.98);
}

/* DARK MODE */
body.dark-mode {
    --bg-start: #1a2a35;
    --bg-mid: #253d48;
    --bg-end: #2d475c;
    --text: #e0d4e8;
    --text-soft: #b8a8c8;
    --text-light: #8a7a9a;
    --card: rgba(45,71,92,.85);
    --card-border: rgba(167,130,198,0.25);
    --navbar-bg: rgba(45,71,92,.9);
    --gradient-purple: linear-gradient(135deg, #9d7fbf, #776fa3, #536088);
    --gradient-purple-light: linear-gradient(135deg, #536088, #455a7d, #2d475c);
    --shadow: rgba(0,0,0,0.2);
    --shadow-hover: rgba(0,0,0,0.3);
    --btn-hover: rgba(167,130,198,0.15);
    --accent-glow: #9d7fbf;
    --dropdown-bg: rgba(45,71,92,.95);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    font-family: 'Poppins', sans-serif;
    color: var(--text);
    overflow-x: hidden;
    transition: background 0.4s ease, color 0.3s ease;
}

/* Clean gradient background */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 30% 40%, var(--bg-mid) 0%, var(--bg-start) 40%, var(--bg-end) 100%);
    z-index: -6;
    transition: background 0.5s ease;
}

body.dark-mode::before {
    background: radial-gradient(ellipse at 70% 30%, var(--bg-mid) 0%, var(--bg-start) 50%, var(--bg-end) 100%);
}

/* Floating orbs */
.glow-bg {
    position: fixed;
    inset: 0;
    z-index: -5;
    pointer-events: none;
}

.glow-sphere {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.35;
    transition: background 0.5s ease;
    animation: floatOrb 20s infinite alternate ease-in-out;
}

.glow-sphere.one {
    width: 500px;
    height: 500px;
    background: #bea5d5;
    top: -150px;
    left: -100px;
}

.glow-sphere.two {
    width: 450px;
    height: 450px;
    background: #9d7fbf;
    bottom: -100px;
    right: -80px;
    animation-delay: -6s;
}

.glow-sphere.three {
    width: 400px;
    height: 400px;
    background: #776fa3;
    bottom: 10%;
    left: 10%;
    opacity: 0.25;
    animation-delay: -12s;
}

body.dark-mode .glow-sphere.one {
    background: #9d7fbf;
}

body.dark-mode .glow-sphere.two {
    background: #776fa3;
}

body.dark-mode .glow-sphere.three {
    background: #536088;
}

@keyframes floatOrb {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, -25px) scale(1.05); }
}

/* ===================================== */
/* NAVBAR */
/* ===================================== */

nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    backdrop-filter: blur(20px);
    background: var(--navbar-bg);
    border-bottom: 1px solid var(--card-border);
    transition: all 0.4s ease;
}

.nav-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 700;
    font-size: 1.2rem;
}

.logo img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    border-radius: 50%;
}

.logo .logo-text {
    background: var(--gradient-purple);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.nav-links {
    display: flex;
    align-items: center;
    gap: 28px;
}

.nav-links a {
    color: var(--text);
    text-decoration: none;
    font-weight: 500;
    font-size: 0.9rem;
    transition: color 0.2s ease;
    opacity: 0.8;
}

.nav-links a:hover {
    opacity: 1;
    color: #bea5d5;
}

.right-buttons {
    display: flex;
    align-items: center;
    gap: 12px;
}

.menu-toggle {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 24px;
    height: 18px;
    cursor: pointer;
    z-index: 1002;
}

.menu-toggle span {
    width: 100%;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: all 0.3s ease;
}

.theme-toggle {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--card-border);
    background: var(--card);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
}

.theme-toggle svg {
    width: 18px;
    height: 18px;
    stroke: var(--text);
    stroke-width: 1.8;
    fill: none;
}

.theme-toggle:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 12px var(--shadow);
}

/* Mobile menu */
@media (max-width: 768px) {
    .menu-toggle {
        display: flex;
    }
    
    .nav-links {
        position: fixed;
        top: 70px;
        right: 20px;
        left: auto;
        width: 260px;
        background: var(--dropdown-bg);
        backdrop-filter: blur(20px);
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        padding: 16px;
        border-radius: 24px;
        border: 1px solid var(--card-border);
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        transition: all 0.3s ease;
        z-index: 1001;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
    }
    
    .nav-links.active {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }
    
    .nav-links a {
        padding: 12px 16px;
        border-radius: 16px;
        transition: all 0.2s ease;
        font-size: 0.95rem;
    }
    
    .nav-links a:hover {
        background: var(--btn-hover);
        transform: translateX(5px);
    }
    
    .menu-toggle.active span:nth-child(1) {
        transform: rotate(45deg) translate(5px, 5px);
    }
    
    .menu-toggle.active span:nth-child(2) {
        opacity: 0;
    }
    
    .menu-toggle.active span:nth-child(3) {
        transform: rotate(-45deg) translate(5px, -5px);
    }
}

@media (min-width: 769px) {
    .menu-toggle {
        display: none !important;
    }
}

/* ===================================== */
/* HERO SECTION */
/* ===================================== */

.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 24px 80px;
}

.hero-content {
    max-width: 900px;
}

.hero-logo img {
    width: 140px;
    height: 140px;
    object-fit: contain;
    margin-bottom: 24px;
    animation: gentleFloat 4s ease-in-out infinite;
}

@keyframes gentleFloat {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
}

.hero h1 {
    font-size: 4rem;
    line-height: 1.2;
    margin-bottom: 20px;
    background: var(--gradient-purple);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero p {
    font-size: 1.1rem;
    color: var(--text-soft);
    margin-bottom: 40px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.7;
}

/* Buttons */
.btn-group {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.btn {
    padding: 14px 36px;
    border-radius: 50px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s ease;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 0.95rem;
}

.btn-primary {
    background: var(--gradient-purple);
    color: white;
    border: none;
    box-shadow: 0 4px 15px rgba(128,100,150,0.25);
}

.btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(128,100,150,0.35);
}

.btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1.5px solid var(--card-border);
}

.btn-secondary:hover {
    border-color: #bea5d5;
    background: var(--btn-hover);
    transform: translateY(-3px);
}

.btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    stroke-width: 2;
}

@media (max-width: 768px) {
    .hero h1 {
        font-size: 2.5rem;
    }
    .hero p {
        font-size: 1rem;
    }
    .btn {
        padding: 12px 28px;
        font-size: 0.85rem;
    }
}

/* ===================================== */
/* SECTIONS */
/* ===================================== */

section {
    padding: 80px 24px;
}

.container {
    max-width: 1280px;
    margin: 0 auto;
}

.section-header {
    text-align: center;
    margin-bottom: 60px;
}

.section-header h2 {
    font-size: 2.5rem;
    margin-bottom: 12px;
    background: var(--gradient-purple);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.section-header p {
    color: var(--text-soft);
    font-size: 1rem;
}

@media (max-width: 768px) {
    section {
        padding: 60px 20px;
    }
    .section-header h2 {
        font-size: 2rem;
    }
}

/* Features Grid */
.features-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}

.feature-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    padding: 32px 28px;
    border-radius: 28px;
    transition: all 0.3s ease;
    text-align: center;
}

.feature-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 35px var(--shadow-hover);
}

.feature-icon {
    width: 64px;
    height: 64px;
    background: var(--gradient-purple);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px auto;
}

.feature-icon svg {
    width: 32px;
    height: 32px;
    stroke: white;
    stroke-width: 1.7;
    fill: none;
}

.feature-card h3 {
    font-size: 1.25rem;
    margin-bottom: 10px;
}

.feature-card p {
    color: var(--text-soft);
    line-height: 1.6;
    font-size: 0.9rem;
}

/* Gallery Grid */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
}

.gallery-item {
    border-radius: 28px;
    overflow: hidden;
    height: 280px;
    position: relative;
    cursor: pointer;
    transition: all 0.3s ease;
}

.gallery-item:hover {
    transform: translateY(-6px);
}

.gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

.gallery-item:hover img {
    transform: scale(1.05);
}

.gallery-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.65), transparent);
    padding: 24px;
}

.gallery-overlay h3 {
    color: white;
    font-size: 1.2rem;
    margin-bottom: 4px;
}

.gallery-overlay p {
    color: rgba(255,255,255,0.8);
    font-size: 0.8rem;
}

/* FAQ */
.faq-container {
    max-width: 750px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.faq-item {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.3s ease;
}

.faq-question {
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    cursor: pointer;
}

.faq-question svg {
    width: 20px;
    height: 20px;
    stroke: var(--text);
    stroke-width: 2;
    transition: transform 0.3s ease;
}

.faq-answer {
    max-height: 0;
    padding: 0 24px;
    opacity: 0;
    overflow: hidden;
    transition: all 0.3s ease;
    color: var(--text-soft);
    line-height: 1.6;
    font-size: 0.9rem;
}

.faq-item.active .faq-answer {
    max-height: 200px;
    padding: 0 24px 24px;
    opacity: 1;
}

.faq-item.active .faq-question svg {
    transform: rotate(45deg);
}

/* Community Cards */
.community-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
}

.community-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    padding: 32px 24px;
    border-radius: 24px;
    text-align: center;
    transition: all 0.3s ease;
    text-decoration: none;
    display: block;
}

.community-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px var(--shadow-hover);
    border-color: #bea5d5;
}

.community-icon {
    width: 56px;
    height: 56px;
    background: var(--gradient-purple);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px auto;
}

.community-icon svg {
    width: 28px;
    height: 28px;
    stroke: white;
    stroke-width: 1.7;
    fill: none;
}

.community-card h3 {
    font-size: 1.2rem;
    margin-bottom: 6px;
    color: var(--text);
}

.community-card p {
    color: var(--text-soft);
    font-size: 0.85rem;
    margin-bottom: 12px;
}

.community-card span {
    color: #9d7fbf;
    font-size: 0.8rem;
    font-weight: 500;
}

/* Footer */
footer {
    margin-top: 40px;
    background: var(--card);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--card-border);
    padding: 50px 24px 30px;
}

.footer-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 40px;
}

.footer-brand h3 {
    font-size: 1.4rem;
    margin-bottom: 10px;
    background: var(--gradient-purple);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}

.footer-brand p {
    max-width: 300px;
    color: var(--text-soft);
    line-height: 1.6;
    font-size: 0.85rem;
}

.footer-links {
    display: flex;
    gap: 50px;
    flex-wrap: wrap;
}

.footer-col h4 {
    font-size: 1rem;
    margin-bottom: 16px;
    color: var(--text);
}

.footer-col a {
    display: block;
    color: var(--text-soft);
    text-decoration: none;
    margin: 10px 0;
    font-size: 0.85rem;
    transition: color 0.2s ease;
}

.footer-col a:hover {
    color: #bea5d5;
}

.social-links {
    display: flex;
    gap: 12px;
    margin-top: 16px;
}

.social-links a {
    width: 38px;
    height: 38px;
    background: var(--gradient-purple);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    box-shadow: 0 2px 8px rgba(128,100,150,0.2);
}

.social-links a svg {
    width: 18px;
    height: 18px;
    stroke: white;
    stroke-width: 1.8;
    fill: none;
}

.social-links a:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 6px 16px rgba(128,100,150,0.35);
}

.footer-bottom {
    text-align: center;
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--card-border);
    font-size: 0.75rem;
    color: var(--text-light);
}

@media (max-width: 768px) {
    .footer-inner {
        flex-direction: column;
        text-align: center;
        gap: 30px;
    }
    .footer-brand p {
        max-width: 100%;
    }
    .footer-links {
        justify-content: center;
        gap: 30px;
    }
    .social-links {
        justify-content: center;
    }
}

/* Fade animation */
.fade-on-scroll {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s ease, transform 0.7s ease;
}

.fade-on-scroll.fade-in-view {
    opacity: 1;
    transform: translateY(0);
}

/* Click glow */
.click-glow {
    position: fixed;
    width: 0;
    height: 0;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(circle, var(--accent-glow), transparent 70%);
    transform: translate(-50%, -50%);
    animation: glowPop 0.7s ease-out forwards;
    z-index: 10000;
}

@keyframes glowPop {
    0% { width: 0px; height: 0px; opacity: 0.5; }
    100% { width: 400px; height: 400px; opacity: 0; }
}
</style>

<!-- Theme script runs immediately -->
<script>
    (function() {
        const savedTheme = localStorage.getItem('starveil-theme');
        
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
        } else if (savedTheme === 'light') {
            document.body.classList.remove('dark-mode');
        } else {
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (systemPrefersDark) {
                document.body.classList.add('dark-mode');
                localStorage.setItem('starveil-theme', 'dark');
            } else {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('starveil-theme', 'light');
            }
        }
    })();
</script>

</head>

    <!-- FEATURES -->
    <section id="features">
